# tack pins
# edit by hand or with tack add / rm / alias
# nix reads pins.lock.json
# this file drives tack update

# shorturl schemes
# scheme rest expands rest into {path}
[shorturls]
# gh = "github:{path}"
addons = "https://addons.mozilla.org/en-US/firefox/downloads/latest/{path}"

# all_follow maps input names to the top-level pin they follow
# opt out per-input with exclude_follow
[all_follow]
# nixpkgs = "nixpkgs"
# nixpkgs = ["nixpkgs-stable", "nixpkgs-unstable"]

# inputs.<name> fields
#   url             required, shorturl ok, ?rev=<sha> pins an exact commit
#   type            flake (default), fetch, or fixed
#   flake           legacy false means type = "fetch"
#   follows         { child = "pin" } override map
#   exclude_follow  all_follow names to skip
#   dir             subdir holding flake.nix
#   submodules      fetch git submodules
#   unpack          fixed-only tarball or file
[inputs.ublock]
url = "addons:ublock-origin/latest.xpi"
type = "fixed"

[inputs.betterttv]
url = "addons:betterttv/latest.xpi"
type = "fixed"

[inputs.darkreader]
url = "addons:darkreader/latest.xpi"
type = "fixed"

[inputs.proton-vpn]
url = "addons:proton-vpn-firefox-extension/latest.xpi"
type = "fixed"

[inputs.yomitan]
url = "addons:yomitan/latest.xpi"
type = "fixed"

[inputs.return-youtube-dislikes]
url = "addons:return-youtube-dislikes/latest.xpi"
type = "fixed"

[inputs.keepassxc-browser]
url = "addons:keepassxc-browser/latest.xpi"
type = "fixed"

[inputs.vimium-ff]
url = "addons:vimium-ff/latest.xpi"
type = "fixed"

[inputs.proton-ge]
url = "https://github.com/GloriousEggroll/proton-ge-custom/releases/download/GE-Proton11-1/GE-Proton11-1.tar.gz"
type = "fixed"

[inputs.proton-cachyos]
url = "https://github.com/CachyOS/proton-cachyos/releases/download/cachyos-11.0-20260703-slr/proton-cachyos-11.0-20260703-slr-x86_64.tar.xz"
type = "fixed"

[inputs.proton-dw]
url = "https://dawn.wine/dawn-winery/dwproton/releases/download/dwproton-11.0-9/dwproton-11.0-9-x86_64.tar.xz"
type = "fixed"
